        <h1>Synchronize Tab Scrolling</h1>
        <p>
          <strong>Scroll once, sync everywhere.</strong> A free, open-source
          browser extension that keeps multiple tabs scrolling together —
          perfect for comparing translations, code, or documents side by side.
        </p>
        <h2>How it works</h2>
        <ol>
          <li>Install the extension from your browser's store</li>
          <li>Open the tabs you want to sync</li>
          <li>
            Click the extension icon, select your tabs, and start scrolling
          </li>
        </ol>
        <h2>Features</h2>
        <ul>
          <li>Real-time scroll synchronization across tabs</li>
          <li>Manual position adjustment (hold Option/Alt while scrolling)</li>
          <li>Auto-sync suggestion for duplicate URLs</li>
          <li>URL navigation sync</li>
          <li>Domain exclusion management</li>
          <li>Auto-reconnection after sleep</li>
        </ul>
