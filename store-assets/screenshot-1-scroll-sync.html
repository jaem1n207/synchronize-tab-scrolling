<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 1280px;
        height: 800px;
        background: #09090b;
        color: white;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        overflow: hidden;
        position: relative;
      }

      /* Subtle radial glow */
      .bg-glow {
        position: absolute;
        inset: 0;
        background: radial-gradient(
          ellipse 70% 50% at 50% 55%,
          rgba(255, 255, 255, 0.03) 0%,
          transparent 70%
        );
        pointer-events: none;
      }

      .container {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 48px 80px;
      }

      /* Header with logo */
      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 20px;
      }
      .logo {
        width: 28px;
        height: 28px;
        background: #18181b;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .logo svg {
        width: 18px;
        height: 18px;
      }
      .brand-name {
        font-size: 14px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.5);
        letter-spacing: 0.02em;
      }

      /* Headline */
      .headline {
        font-size: 40px;
        font-weight: 700;
        text-align: center;
        letter-spacing: -0.025em;
        line-height: 1.15;
        margin-bottom: 12px;
        background: linear-gradient(180deg, #ffffff 0%, rgba(255, 255, 255, 0.8) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .subheadline {
        font-size: 16px;
        color: rgba(255, 255, 255, 0.45);
        text-align: center;
        margin-bottom: 40px;
        font-weight: 400;
      }

      /* Browser mockups container */
      .browsers {
        display: flex;
        align-items: center;
        gap: 0;
        width: 100%;
        max-width: 960px;
      }

      .browser {
        flex: 1;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: #18181b;
        box-shadow:
          0 20px 60px rgba(0, 0, 0, 0.5),
          0 0 0 1px rgba(255, 255, 255, 0.05);
        position: relative;
      }
      .browser.active {
        border-color: rgba(59, 130, 246, 0.4);
        box-shadow:
          0 20px 60px rgba(0, 0, 0, 0.5),
          0 0 40px rgba(59, 130, 246, 0.1),
          0 0 0 1px rgba(59, 130, 246, 0.3);
      }

      .browser-chrome {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        background: #1c1c1f;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }
      .traffic-lights {
        display: flex;
        gap: 6px;
      }
      .traffic-lights span {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }
      .tl-red {
        background: #ff5f57;
      }
      .tl-yellow {
        background: #febc2e;
      }
      .tl-green {
        background: #28c840;
      }

      .tab-bar {
        display: flex;
        align-items: center;
        margin-left: 8px;
      }
      .tab {
        padding: 5px 14px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 6px 6px 0 0;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.7);
        font-weight: 500;
        border-bottom: 2px solid rgba(59, 130, 246, 0.5);
      }

      .url-bar {
        padding: 6px 14px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        background: #1a1a1d;
      }
      .url-bar-inner {
        display: flex;
        align-items: center;
        gap: 6px;
        background: rgba(255, 255, 255, 0.04);
        border-radius: 6px;
        padding: 5px 10px;
      }
      .lock-icon {
        width: 10px;
        height: 10px;
        color: rgba(255, 255, 255, 0.25);
      }
      .url-text {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.4);
        font-family: inherit;
      }

      .browser-content {
        height: 280px;
        padding: 20px;
        overflow: hidden;
        position: relative;
      }

      /* Scroll indicator */
      .scroll-track {
        position: absolute;
        right: 4px;
        top: 8px;
        bottom: 8px;
        width: 5px;
        background: rgba(255, 255, 255, 0.04);
        border-radius: 3px;
      }
      .scroll-thumb {
        width: 5px;
        height: 50px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 3px;
        position: absolute;
        top: 35%;
        transition: top 0.3s;
      }

      /* Content lines */
      .content-line {
        height: 8px;
        border-radius: 4px;
        margin-bottom: 10px;
        background: rgba(255, 255, 255, 0.06);
      }
      .content-line.heading {
        height: 14px;
        width: 60%;
        background: rgba(255, 255, 255, 0.12);
        margin-bottom: 16px;
      }
      .content-line.w-90 {
        width: 90%;
      }
      .content-line.w-85 {
        width: 85%;
      }
      .content-line.w-80 {
        width: 80%;
      }
      .content-line.w-75 {
        width: 75%;
      }
      .content-line.w-70 {
        width: 70%;
      }
      .content-line.w-65 {
        width: 65%;
      }
      .content-line.w-50 {
        width: 50%;
      }
      .content-line.w-95 {
        width: 95%;
      }
      .content-line.highlight {
        background: rgba(59, 130, 246, 0.15);
        border: 1px solid rgba(59, 130, 246, 0.2);
      }

      /* Connection line */
      .connection {
        width: 80px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        flex-shrink: 0;
      }
      .conn-line {
        width: 2px;
        height: 120px;
        background: linear-gradient(
          180deg,
          transparent 0%,
          rgba(59, 130, 246, 0.5) 30%,
          rgba(59, 130, 246, 0.5) 70%,
          transparent 100%
        );
        position: relative;
      }
      .conn-line::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 50px;
        height: 50px;
        background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
        border-radius: 50%;
      }

      .sync-badge {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(59, 130, 246, 0.15);
        border: 1px solid rgba(59, 130, 246, 0.3);
        border-radius: 20px;
        padding: 6px 14px;
        font-size: 11px;
        font-weight: 600;
        color: #60a5fa;
        white-space: nowrap;
        display: flex;
        align-items: center;
        gap: 5px;
        backdrop-filter: blur(8px);
      }
      .sync-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #3b82f6;
        box-shadow: 0 0 8px rgba(59, 130, 246, 0.6);
      }

      /* Browser badges */
      .browser-badges {
        display: flex;
        gap: 8px;
        margin-top: 32px;
      }
      .badge {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.5);
        font-weight: 500;
      }
      .badge-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
      }
      .badge-chrome .badge-dot {
        background: #4285f4;
      }
      .badge-firefox .badge-dot {
        background: #ff7139;
      }
      .badge-edge .badge-dot {
        background: #0078d7;
      }
      .badge-brave .badge-dot {
        background: #fb542b;
      }
    </style>
  </head>
  <body>
    <div class="bg-glow"></div>
    <div class="container">
      <div class="header">
        <div class="logo">
          <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M6.5 16c0-2.5 2-4.5 4.5-4.5 1.7 0 3.1.9 3.9 2.3L16 16l-1.1 2.2c-.8 1.4-2.2 2.3-3.9 2.3-2.5 0-4.5-2-4.5-4.5zm10.1-2.2L17.7 16l-1.1 2.2c.8 1.4 2.2 2.3 3.9 2.3 2.5 0 4.5-2 4.5-4.5s-2-4.5-4.5-4.5c-1.7 0-3.1.9-3.9 2.3z"
              stroke="white"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
        <span class="brand-name">Synchronize Tab Scrolling</span>
      </div>

      <h1 class="headline">Scroll one tab, both move together</h1>
      <p class="subheadline">Real-time scroll synchronization across all your linked tabs</p>

      <div class="browsers">
        <div class="browser active">
          <div class="browser-chrome">
            <div class="traffic-lights">
              <span class="tl-red"></span>
              <span class="tl-yellow"></span>
              <span class="tl-green"></span>
            </div>
            <div class="tab-bar">
              <div class="tab">article.en</div>
            </div>
          </div>
          <div class="url-bar">
            <div class="url-bar-inner">
              <svg
                class="lock-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
              <span class="url-text">example.com/article</span>
            </div>
          </div>
          <div class="browser-content">
            <div class="content-line heading" style="width: 55%"></div>
            <div class="content-line w-90"></div>
            <div class="content-line w-85"></div>
            <div class="content-line w-95"></div>
            <div class="content-line w-70"></div>
            <div class="content-line w-90 highlight"></div>
            <div class="content-line w-80 highlight"></div>
            <div class="content-line w-85 highlight"></div>
            <div class="content-line w-75"></div>
            <div class="content-line w-90"></div>
            <div class="content-line w-65"></div>
            <div class="content-line w-80"></div>
            <div class="content-line w-90"></div>
            <div class="content-line w-70"></div>
            <div class="scroll-track"><div class="scroll-thumb"></div></div>
          </div>
        </div>

        <div class="connection">
          <div class="conn-line"></div>
          <div class="sync-badge">
            <span class="sync-dot"></span>
            Synced
          </div>
        </div>

        <div class="browser active">
          <div class="browser-chrome">
            <div class="traffic-lights">
              <span class="tl-red"></span>
              <span class="tl-yellow"></span>
              <span class="tl-green"></span>
            </div>
            <div class="tab-bar">
              <div class="tab">article.ko</div>
            </div>
          </div>
          <div class="url-bar">
            <div class="url-bar-inner">
              <svg
                class="lock-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
              <span class="url-text">example.com/ko/article</span>
            </div>
          </div>
          <div class="browser-content">
            <div class="content-line heading" style="width: 45%"></div>
            <div class="content-line w-85"></div>
            <div class="content-line w-90"></div>
            <div class="content-line w-80"></div>
            <div class="content-line w-75"></div>
            <div class="content-line w-85 highlight"></div>
            <div class="content-line w-90 highlight"></div>
            <div class="content-line w-75 highlight"></div>
            <div class="content-line w-90"></div>
            <div class="content-line w-70"></div>
            <div class="content-line w-85"></div>
            <div class="content-line w-80"></div>
            <div class="content-line w-95"></div>
            <div class="content-line w-65"></div>
            <div class="scroll-track"><div class="scroll-thumb"></div></div>
          </div>
        </div>
      </div>

      <div class="browser-badges">
        <div class="badge badge-chrome"><span class="badge-dot"></span>Chrome</div>
        <div class="badge badge-firefox"><span class="badge-dot"></span>Firefox</div>
        <div class="badge badge-edge"><span class="badge-dot"></span>Edge</div>
        <div class="badge badge-brave"><span class="badge-dot"></span>Brave</div>
      </div>
    </div>
  </body>
</html>
