name: Deploy Landing Page

on:
  push:
    branches:
      - main
    paths:
      - 'src/landing/**'
      - 'src/shared/**'
      - 'scripts/prerender-landing.ts'
      - 'scripts/fetch-store-stats.ts'
      - 'vite.config.landing.mts'
      - 'uno.config.ts'
      - 'tsconfig.json'
      - '.github/workflows/deploy-landing.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Update sitemap lastmod and JSON-LD dateModified
        run: |
          CONTENT_DATE=$(git log -1 --format=%cd --date=short -- src/landing/ src/shared/)
          if [ -z "$CONTENT_DATE" ]; then
            echo "No landing commits found, skipping date update"
            exit 0
          fi
          echo "Last landing content commit: $CONTENT_DATE"
          sed -i "s/<lastmod>.*<\/lastmod>/<lastmod>${CONTENT_DATE}<\/lastmod>/" src/landing/public/sitemap.xml
          sed -i "s/\"dateModified\": \"[^\"]*\"/\"dateModified\": \"${CONTENT_DATE}\"/" src/landing/index.html

      - name: Build landing page
        run: pnpm build:landing
        env:
          LANDING_BASE: /synchronize-tab-scrolling/

      - name: Move index.html to artifact root
        run: cp dist-landing/landing/index.html dist-landing/index.html

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Prerender landing page for SEO
        run: pnpm prerender:landing
        env:
          LANDING_BASE: /synchronize-tab-scrolling/

      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist-landing

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
