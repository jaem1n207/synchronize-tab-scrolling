name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'src/landing/**'
      - 'vite.config.landing.mts'
      - 'scripts/fetch-store-stats.ts'
      - '.github/workflows/deploy-landing.yml'
      - '.github/workflows/update-store-stats.yml'

permissions:
  contents: read

jobs:
  release:
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - run: bun install

      - name: Build Chrome extension
        run: bun run build

      - name: Copy Chrome build artifacts
        run: mkdir -p build/chrome && cp -r extension/* build/chrome/

      - name: Build Firefox extension
        run: bun run build-firefox

      - name: Copy Firefox build artifacts
        run: mkdir -p build/firefox && cp -r extension/* build/firefox/

      - name: Setup Node LTS for semantic-release
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
          AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
          EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
          EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          EDGE_API_KEY: ${{ secrets.EDGE_API_KEY }}
        run: npx semantic-release
